      <<: *healthcheck
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]

  torbox-addon:
    build: .
    command: ["packages/torbox-addon/src/index.ts"]
